<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Outside Count</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8}
.container{padding:12px}
h2{text-align:center;color:#1e1efd}
.top-bar,.filter-bar{display:flex;gap:8px;margin-bottom:10px;justify-content:space-between}
button{border:none;border-radius:6px;padding:12px;color:#fff;font-size:14px;cursor:pointer}
.add-btn{background:#28a745;flex:1}
.export-btn{background:#1e1efd;flex:1}
.search{width:100%;padding:12px;border:1px solid #ccc;border-radius:6px;margin-bottom:10px}
.count{margin-bottom:10px;font-weight:bold}
.card{background:#fff;border-radius:8px;padding:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.card.counted{background:#e8f8e8}
.label{font-weight:bold;color:#666}
input[type=text]{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
.inline-fields{display:flex;gap:8px;margin-top:8px}
.inline-field{}
.inline-field input{text-align:center}
.note-input{margin-top:8px}
.sqft-link{cursor:pointer;color:#1e1efd;font-weight:bold;margin-top:10px}
.check-btn{background:#28a745;padding:8px}
.clear-btn{background:#666}

</style>
</head>

<body>
<div class="container">
<h2>Outside Count</h2>

<div class="top-bar">
<button class="add-btn" onclick="addRow()">+ Add Row</button>
<button class="export-btn" onclick="exportExcel()">📤 Export</button>
</div>

<div class="filter-bar">
<label><input type="checkbox" id="uncountedOnly"> Uncounted</label>
<label><input type="checkbox" id="countedOnly"> Counted</label>
</div>
<div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin:10px 0;
">

  <select id="sqftDropdown"
    onchange="setSqftFilter(this.value)"
    style="
      flex:1;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:14px;
      background:#fff;
    ">
    <option value="">All Sqft</option>
  </select>

  <button class="clear-btn"
    onclick="clearSqftFilter()"
    style="
      padding:10px 14px;
      border-radius:8px;
      white-space:nowrap;
    ">
    Clear
  </button>

</div>

<input id="searchInput" class="search" placeholder="Search...">
<div id="activeFilter"></div>
<div class="count" id="rowCount">Products: 0</div>
<div id="list"></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<script>
const STORAGE_KEY="outsideCountData";
let data=[];
let sqftFilter="";

document.getElementById("searchInput").addEventListener("input",render);
document.getElementById("uncountedOnly").addEventListener("change",render);
document.getElementById("countedOnly").addEventListener("change",render);

async function loadExcel(){

 let saved={};
 try{ saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }catch{}

 const [masterResp,v2Resp]=await Promise.allSettled([
   fetch("outside-count.xlsx"),
   fetch("outside-count-v2.xlsx")
 ]);

 let masterRows=[];
 let v2Rows=[];

 if(masterResp.status==="fulfilled"){
   const wb=XLSX.read(await masterResp.value.arrayBuffer());
   masterRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
 }

 if(v2Resp.status==="fulfilled"){
   const wb2=XLSX.read(await v2Resp.value.arrayBuffer());
   v2Rows=XLSX.utils.sheet_to_json(wb2.Sheets[wb2.SheetNames[0]]);
 }

 const map={};

 masterRows.forEach(r=>{
   const name=r["Product Name"]||"";
   if(!name) return;

   map[name]={
     "Product Name":name,
     "Sqft":r["Sqft"]??"",
     "Box Quantity":r["Box Quantity"]??"",
     "TAKEN":r["TAKEN"]??"",
     "Note":r["Note"]??""
   };
 });

 v2Rows.forEach(r=>{
   const name=r["Product Name"]||"";
   if(!name) return;

   if(!map[name]){
     map[name]={
       "Product Name":name,
       "Sqft":"",
       "Box Quantity":"",
       "TAKEN":"",
       "Note":""
     };
   }

   if(Number(r["TAKEN"])>0){
     map[name]["TAKEN"]=r["TAKEN"];
   }
 });

let baseData = Object.values(map);

// restore saved data (includes new rows)
let savedData = Object.values(saved || {});

// merge logic:
// - keep saved rows (includes new rows)
// - override with Excel base only if product exists there

const finalMap = {};

// first load Excel base
baseData.forEach(r => {
  const name = r["Product Name"];
  if (!name) return;
  finalMap[name] = r;
});

// then apply saved (adds new rows + overrides edits)
savedData.forEach(r => {
  const name = r["Product Name"];
  if (!name) return;
  finalMap[name] = {
    ...finalMap[name],
    ...r
  };
});

const allRows = Object.values(finalMap);

// detect "new rows":
// (rows that are NOT in Excel base list)
const baseNames = new Set(baseData.map(r => r["Product Name"]));

const newRows = allRows.filter(r => !baseNames.has(r["Product Name"]));
const existingRows = allRows.filter(r => baseNames.has(r["Product Name"]));

// NEW rows on top
data = [...newRows, ...existingRows];

save();
populateSqftDropdown();
render();
}

function save(){
 const obj={};
 data.forEach(r=>obj[r["Product Name"]]=r);
 localStorage.setItem(STORAGE_KEY,JSON.stringify(obj));
}

function populateSqftDropdown(){

  const dropdown = document.getElementById("sqftDropdown");

  const map = {};

  data.forEach(r => {
    const sqft = r["Sqft"];
    if(!sqft) return;

    if(!map[sqft]){
      map[sqft] = { total: 0, counted: 0 };
    }

    map[sqft].total++;

    if(Number(r["TAKEN"]) > 0){
      map[sqft].counted++;
    }
  });

  const options = Object.entries(map)
    .sort((a,b) => Number(a[0]) - Number(b[0]))
    .map(([sqft, stats]) => {
      return `<option value="${sqft}">
        ${sqft} - (${stats.counted}/${stats.total})
      </option>`;
    })
    .join("");

  dropdown.innerHTML =
    `<option value="">All Sqft</option>` + options;
}

function setSqftFilter(v){
  sqftFilter = v;
  document.getElementById("sqftDropdown").value = v;
  render();
}

function clearSqftFilter(){
  sqftFilter = "";
  document.getElementById("sqftDropdown").value = "";
  render();
}

// improved search (any word order)
function matchesSearch(row, search){
 if(!search) return true;

 const text=Object.values(row).join(" ").toLowerCase();
 const words=search.toLowerCase().split(/\s+/).filter(Boolean);

 return words.every(w=>text.includes(w));
}

function render(){

 const search=document.getElementById("searchInput").value;
 const onlyUncounted=document.getElementById("uncountedOnly").checked;
 const onlyCounted=document.getElementById("countedOnly").checked;

 const list=document.getElementById("list");
 list.innerHTML="";

 document.getElementById("activeFilter").innerHTML=
   sqftFilter?("Sqft Filter: "+sqftFilter):"";

 const filtered=data.filter(r=>{

   const matchesSqft=!sqftFilter || String(r["Sqft"])===String(sqftFilter);

   const matchesCounted =
     onlyCounted ? Number(r["TAKEN"])>0 :
     onlyUncounted ? !(Number(r["TAKEN"])>0) :
     true;

   return matchesSearch(r,search) && matchesSqft && matchesCounted;
 });

 document.getElementById("rowCount").innerText="Products: "+filtered.length;

 filtered.forEach(row=>{
   const idx=data.indexOf(row);

   const div=document.createElement("div");
   div.className="card"+(Number(row["TAKEN"])>0?" counted":"");

   div.innerHTML=`
   <div class="label">Product Name</div>
   <input type="text"
     value="${row["Product Name"]}"
     oninput="updateField(${idx},'Product Name',this.value)"
     onblur="render()">

   <div class="inline-fields">

      <div class="inline-field">
         <div class="label">Sqft</div>
         <div class="sqft-link" onclick="setSqftFilter('${row["Sqft"]}')">
           ${row["Sqft"]}
         </div>
      </div>

      <div class="inline-field">
         <div class="label">Boxes</div>
         <input type="number" step="0.01"
           value="${row["Box Quantity"]}"
           oninput="updateField(${idx},'Box Quantity',this.value)"
           onblur="render()">
      </div>

      <div class="inline-field">
         <div class="label">Taken</div>
         <input type="number" step="0.01"
           value="${row["TAKEN"]}"
           oninput="updateField(${idx},'TAKEN',this.value)"
           onblur="render()">
      </div>

      <div class="inline-field">
         <div class="label">&nbsp;</div>
         <button class="check-btn" onclick="copyBoxes(${idx})">✓</button>
      </div>

   </div>

   <div class="note-input">
      <div class="label">Note</div>
      <input type="text"
        value="${row["Note"]||""}"
        oninput="updateField(${idx},'Note',this.value)"
        onblur="render()">
   </div>
   `;

   list.appendChild(div);
 });

  populateSqftDropdown();

}

function copyBoxes(i){
 data[i]["TAKEN"]=data[i]["Box Quantity"];
 save(); render();
}

function updateField(i,f,v){
 data[i][f]=v;
 save();
 // NO render here → fixes cursor + typing issue
}

function addRow(){
 data.unshift({
   "Product Name":"",
   "Sqft":"",
   "Box Quantity":"",
   "TAKEN":"",
   "Note":""
 });
 save(); render();
}

function exportExcel(){
 const ws=XLSX.utils.json_to_sheet(data);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Outside Count");
 XLSX.writeFile(wb,"outside-count-export.xlsx");
}

loadExcel();
</script>

</body>
</html>
